name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      # Drift-vakten i tests/test_research_reproducibility.py skipper hvis verken
      # `just` eller `make` finnes. Uten dette steget kjørte den aldri i CI.
      - name: Set up just
        uses: extractions/setup-just@v3

      - name: Install dependencies
        run: |
          pip install pytest pytest-cov hypothesis vulture ruff mypy

      - name: Run linter (ruff)
        run: |
          ruff check custom_components/stromkalkulator/
          echo "✅ Linting passed"

      - name: Run type checker (mypy)
        run: |
          mypy custom_components/stromkalkulator/ --ignore-missing-imports
          echo "✅ Type checking passed"

      - name: Run unit tests with coverage
        run: |
          # test_smoke_ha.py ekskluderes: den kjører mot ekte HA i egen jobb.
          # conftest.py mocker homeassistant.* globalt her, så den ville kollidere.
          pytest tests/ --ignore=tests/test_smoke_ha.py -v --cov=custom_components/stromkalkulator --cov-report=xml --cov-report=term-missing
          echo "✅ All unit tests passed"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
          verbose: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Validate manifest
        run: |
          jq empty custom_components/stromkalkulator/manifest.json || exit 1
          echo "✅ Manifest JSON is valid"

      - name: Check for dead code with Vulture
        run: |
          vulture custom_components/stromkalkulator/ vulture_whitelist.py --min-confidence 80 || true
          echo "ℹ️ Vulture check complete (warnings only)"

      - name: Check version consistency
        run: |
          VERSION=$(jq -r '.version' custom_components/stromkalkulator/manifest.json)
          echo "📦 manifest.json version: $VERSION"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "❌ Invalid version format: $VERSION"
            exit 1
          fi
          echo "✅ Version format is valid"

          PYPROJECT_VERSION=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")
          echo "📦 pyproject.toml version: $PYPROJECT_VERSION"
          if [[ "$VERSION" != "$PYPROJECT_VERSION" ]]; then
            echo "❌ Version drift: manifest.json ($VERSION) != pyproject.toml ($PYPROJECT_VERSION)"
            exit 1
          fi
          echo "✅ manifest.json and pyproject.toml versions match"

  # Egen jobb for røyktesten mot ekte Home Assistant. Isolert fra `test`-jobben
  # fordi tests/conftest.py mocker homeassistant.* globalt for hele tests/-mappen.
  # Vi kjører med --noconftest (slår kun av conftest.py, ikke entry-point-pluginen
  # pytest-homeassistant-custom-component) og asyncio_mode=auto (hass-fixturen er
  # en async generator). Se tests/test_smoke_ha.py for detaljer.
  smoke-ha:
    name: Smoke test (real Home Assistant)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install Home Assistant test framework
        run: |
          # Trekker inn homeassistant + pytest-oppsett transitivt.
          pip install pytest-homeassistant-custom-component

      - name: Run real-HA smoke test
        run: |
          pytest tests/test_smoke_ha.py --noconftest -o asyncio_mode=auto
          echo "✅ Real-HA smoke test passed"
